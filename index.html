<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lusyn — coming soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg: #FDFBF7;
    --ink: #2C2A26;
    --ink-soft: #6B6760;
    --yellow: #F3C641;
    --yellow-soft: rgba(243,198,65,0.10);
    --blue: #5271FF;
    --violet: #9861DD;
    --violet-soft: rgba(152,97,221,0.07);
    --radius: 24px;
  }

  html{
    font-size:16px;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  body{
    font-family:'DM Sans', sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  canvas#net{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:0;
    opacity:0;
    animation:canvasFadeIn 3s 1.4s ease forwards;
  }
  @keyframes canvasFadeIn{to{opacity:1}}

  .page{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:2rem;
    text-align:center;
    max-width:680px;
  }

  /* ── logo ── */
  .logo{
    width:clamp(200px, 32vw, 320px);
    margin-bottom:3rem;
    opacity:0;
    animation:riseIn 1.2s 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .logo img{
    width:100%;
    height:auto;
    display:block;
  }

  /* ── coming soon pill ── */
  .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 26px;
    border-radius:100px;
    background:var(--violet-soft);
    color:var(--violet);
    font-size:0.8rem;
    font-weight:500;
    letter-spacing:0.05em;
    text-transform:uppercase;
    margin-bottom:2.8rem;
    opacity:0;
    animation:riseIn 1s 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .pill-dot{
    width:6px;height:6px;
    border-radius:50%;
    background:var(--violet);
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:0.35;transform:scale(1)}
    50%{opacity:1;transform:scale(1.5)}
  }

  /* ── tagline with halo ── */
  .halo-wrap{
    position:relative;
    margin-bottom:3rem;
  }
  .halo{
    position:absolute;
    top:50%;left:50%;
    width:300px;height:300px;
    transform:translate(-50%,-50%) scale(0.5);
    border-radius:50%;
    background:radial-gradient(circle, var(--yellow-soft) 0%, transparent 68%);
    opacity:0;
    animation:haloBloom 2.8s 1s ease forwards;
    pointer-events:none;
  }
  @keyframes haloBloom{
    to{opacity:1;transform:translate(-50%,-50%) scale(1)}
  }

  .tagline{
    position:relative;
    font-size:clamp(1.15rem, 2.8vw, 1.5rem);
    font-weight:400;
    line-height:1.7;
    color:var(--ink);
    max-width:500px;
    opacity:0;
    animation:riseIn 1s 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .tagline em{
    font-style:italic;
    font-weight:300;
    color:var(--ink-soft);
  }

  /* ── email capture ── */
  .form-wrap{
    display:flex;
    width:100%;
    max-width:400px;
    border-radius:100px;
    overflow:hidden;
    background:#FFFFFF;
    box-shadow:0 2px 24px rgba(44,42,38,0.05);
    opacity:0;
    animation:riseIn 1s 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
    transition:box-shadow 0.5s ease;
  }
  .form-wrap:focus-within{
    box-shadow:0 4px 36px rgba(82,113,255,0.10);
  }
  .form-wrap input{
    flex:1;
    min-width:0;
    border:none;
    outline:none;
    padding:15px 22px;
    font-family:inherit;
    font-size:0.9rem;
    color:var(--ink);
    background:transparent;
  }
  .form-wrap input::placeholder{
    color:#BAB6AC;
  }
  .form-wrap button{
    border:none;
    background:var(--ink);
    color:var(--bg);
    padding:15px 26px;
    font-family:inherit;
    font-size:0.84rem;
    font-weight:500;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:background 0.4s ease;
    white-space:nowrap;
  }
  .form-wrap button:hover{
    background:var(--blue);
  }

  /* ── footer ── */
  .footer{
    position:fixed;
    bottom:2rem;
    left:50%;
    transform:translateX(-50%);
    font-size:0.73rem;
    color:var(--ink-soft);
    letter-spacing:0.03em;
    opacity:0;
    animation:riseIn 1s 1.8s cubic-bezier(0.22,1,0.36,1) forwards;
    white-space:nowrap;
  }

  @keyframes riseIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }

  @media(max-width:480px){
    .form-wrap{
      flex-direction:column;
      border-radius:var(--radius);
    }
    .form-wrap button{
      border-radius:0 0 var(--radius) var(--radius);
      padding:14px;
    }
    .halo{width:200px;height:200px}
    .footer{font-size:0.68rem}
  }
</style>
</head>

<script>
(function(){
  const c=document.getElementById('net');
  const ctx=c.getContext('2d');
  let W,H,nodes=[],mouse={x:-9999,y:-9999};
  const NUM=36,CONNECT=125,SPEED=0.16;

  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  addEventListener('resize',resize);resize();

  const colors=['rgba(243,198,65,0.16)','rgba(82,113,255,0.12)','rgba(152,97,221,0.10)'];

  for(let i=0;i<NUM;i++){
    nodes.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-0.5)*SPEED,vy:(Math.random()-0.5)*SPEED,
      r:Math.random()*2.2+1.4,
      col:colors[i%colors.length]
    });
  }

  document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<CONNECT){
          ctx.beginPath();
          ctx.moveTo(nodes[i].x,nodes[i].y);
          ctx.lineTo(nodes[j].x,nodes[j].y);
          ctx.strokeStyle='rgba(44,42,38,'+(0.035*(1-d/CONNECT))+')';
          ctx.lineWidth=1;
          ctx.stroke();
        }
      }
    }
    for(const n of nodes){
      const dx=n.x-mouse.x,dy=n.y-mouse.y;
      const md=Math.sqrt(dx*dx+dy*dy);
      if(md<150){n.vx+=dx/md*0.035;n.vy+=dy/md*0.035}
      n.x+=n.vx;n.y+=n.vy;
      n.vx*=0.998;n.vy*=0.998;
      if(n.x<0||n.x>W)n.vx*=-1;
      if(n.y<0||n.y>H)n.vy*=-1;
      ctx.beginPath();
      ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=n.col;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
